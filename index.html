async function fetchBalance(rpc,tokenAddr,walletAddr){
  const sig="0x70a08231";const pad=walletAddr.replace("0x","").toLowerCase().padStart(64,"0");
  const data=sig+pad;
  try{const r=await fetch(rpc,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({jsonrpc:"2.0",id:1,method:"eth_call",params:[{to:tokenAddr,data},"latest"]})});
    const j=await r.json();if(j.result&&j.result!=="0x"){return parseInt(j.result,16)/1e18}return 0;
  }catch{return null}
}

async function fetchAllBalances(){
  const results={};const tasks=[];
  for(const key of Object.keys(ALLOC)){
    const[cid,tokenAddr]=key.split("|");
    const rpc=RPC[cid];
    if(!rpc)continue;
    tasks.push(fetchBalance(rpc,tokenAddr,DISTRIBUTOR).then(bal=>{results[key]=bal}));
  }
  await Promise.allSettled(tasks);return results;
}

function computeNc(section,chainId,tokenSym,balances){
  const cid=CID[chainId];if(!cid)return null;
  const tcKey=`${cid}|${tokenSym}`;const tokenAddr=TC[tcKey];if(!tokenAddr)return null;
  const allocKey=`${cid}|${tokenAddr}`;const alloc=ALLOC[allocKey];if(!alloc)return null;
  const bal=balances[allocKey];if(bal==null)return null;
  const[combined,wh,meta]=alloc;if(combined<=0)return null;
  const totalClaimed=Math.max(0,combined-bal);
  const sectionAlloc=section==="whitehat"?wh:meta;
  if(sectionAlloc<=0)return null;
  const sectionClaimed=totalClaimed*(sectionAlloc/combined);
  return Math.max(0,Math.min(1,(sectionAlloc-sectionClaimed)/sectionAlloc));
}
